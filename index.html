<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A.R.A.N.Y.A | National Environmental Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; background: #000; color: white; margin: 0; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .glass-dark { background: rgba(0,0,0,0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .scan-line { background: linear-gradient(to bottom, transparent, rgba(34,197,94,0.5), transparent); height: 100px; width: 100%; position: absolute; animation: scan 4s linear infinite; pointer-events: none; }
        @keyframes scan { from { top: -100px; } to { top: 100%; } }
        .grid-bg { background-image: radial-gradient(rgba(34,197,94,0.15) 1px, transparent 1px); background-size: 30px 30px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #22c55e; border-radius: 10px; }
        @keyframes notif-slide { from { opacity:0; transform:translateX(30px); } to { opacity:1; transform:translateX(0); } }
        .notif-enter { animation: notif-slide 0.3s ease; }
        select option { background: #1a1a1a; color: white; }
        .mono { font-family: 'Space Mono', monospace; }

        /* ── SIMULATION STYLES ── */
        @keyframes pulse-ring { 0%{transform:scale(1);opacity:0.8} 100%{transform:scale(2.5);opacity:0} }
        @keyframes data-flow { 0%{stroke-dashoffset:200} 100%{stroke-dashoffset:0} }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
        @keyframes matrix-rain { 0%{transform:translateY(-100%)} 100%{transform:translateY(100vh)} }
        @keyframes count-up { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        @keyframes slide-in-right { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }
        @keyframes slide-in-left { from{opacity:0;transform:translateX(-30px)} to{opacity:1;transform:translateX(0)} }
        @keyframes fade-in-up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        @keyframes progress-fill { from{width:0%} to{width:var(--target-width)} }
        @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
        @keyframes orbit { from{transform:rotate(0deg) translateX(60px) rotate(0deg)} to{transform:rotate(360deg) translateX(60px) rotate(-360deg)} }
        @keyframes waveform { 0%,100%{height:4px} 50%{height:28px} }
        @keyframes float-up { 0%{opacity:0;transform:translateY(0)} 50%{opacity:1} 100%{opacity:0;transform:translateY(-60px)} }
        @keyframes highlight-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0)} 50%{box-shadow:0 0 0 6px rgba(34,197,94,0.15)} }

        .sim-stage { animation: fade-in-up 0.5s ease forwards; }
        .flow-arrow { animation: data-flow 1.5s linear infinite; stroke-dasharray: 8 4; }
        .ping-ring::after { content:''; position:absolute; inset:-4px; border-radius:50%; border:2px solid #22c55e; animation:pulse-ring 2s ease-out infinite; }
        .terminal-cursor::after { content:'|'; animation:blink 1s step-end infinite; color:#22c55e; }
        .shimmer-bar { background: linear-gradient(90deg, rgba(34,197,94,0.1) 25%, rgba(34,197,94,0.3) 50%, rgba(34,197,94,0.1) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; }
        .waveform-bar { width:3px; border-radius:2px; background:#22c55e; animation:waveform 0.8s ease-in-out infinite; transform-origin:bottom; }
        .step-active { animation: highlight-pulse 2s ease infinite; }
        .float-particle { animation: float-up 3s ease-in-out infinite; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback, createContext, useContext } = React;
const motionLib = window.Motion || {};
const motion = motionLib.motion || new Proxy({}, { get: () => 'div' });
const AnimatePresence = motionLib.AnimatePresence || (({ children }) => children);
const useScroll = motionLib.useScroll;
const useTransform = motionLib.useTransform;

const LucideIcon = ({ name, className="w-5 h-5", size, color, strokeWidth }) => {
    const ref = useRef(null);
    useEffect(() => {
        if (window.lucide && ref.current) {
            ref.current.innerHTML = '';
            const el = document.createElement('i');
            el.setAttribute('data-lucide', name);
            ref.current.appendChild(el);
            window.lucide.createIcons({ elements:[el], attrs:{ class:className, ...(size&&{width:size,height:size}), ...(color&&{stroke:color}), ...(strokeWidth&&{'stroke-width':strokeWidth}) }, nameAttr:'data-lucide' });
        }
    }, [name, className, size, color, strokeWidth]);
    return <span ref={ref} className="inline-flex items-center justify-center shrink-0"></span>;
};

// ── DATA ──────────────────────────────────────────────────────────────────────
let _counter = 3;
const genId = () => `REP-2024-${String(++_counter).padStart(3,'0')}`;
const INITIAL_REPORTS = [
    { id:"REP-2024-001", topic:"Illegal Granite Mining", coords:"27.4285° N, 76.1245° E", lat:27.43, lng:76.12, status:"Under Investigation", risk:88, loss:"12.4%", date:"2024-05-12", citizen:"Ramesh K.", description:"Heavy machinery observed moving toward the protected forest zone at 2 AM daily.", zone:"Aravalli Zone C", violationType:"Mining" },
    { id:"REP-2024-002", topic:"Forest Encroachment", coords:"28.1121° N, 77.0210° E", lat:28.11, lng:77.02, status:"Under Review", risk:64, loss:"4.2%", date:"2024-05-14", citizen:"Anita S.", description:"Fencing appearing around common grazing lands near the reserve border.", zone:"Delhi Ridge Zone B", violationType:"Encroachment" },
];
const VIOLATION_TYPES = ["Mining","Encroachment","Logging","Poaching","Industrial Waste","Water Contamination"];
const ZONES = ["Aravalli Zone A","Aravalli Zone B","Aravalli Zone C","Delhi Ridge Zone A","Delhi Ridge Zone B","Haryana Forest Reserve","Yamuna Floodplain"];
const STATUSES = ["Pending Review","Under Review","Under Investigation","Resolved","Closed"];

// ── NOTIFICATIONS ─────────────────────────────────────────────────────────────
const NotifCtx = createContext(null);
const useNotify = () => useContext(NotifCtx);
const NotificationProvider = ({ children }) => {
    const [notifs, setNotifs] = useState([]);
    const notify = useCallback((msg, type='info') => {
        const id = Date.now();
        setNotifs(p => [...p, { id, msg, type }]);
        setTimeout(() => setNotifs(p => p.filter(n => n.id !== id)), 4000);
    }, []);
    return (
        <NotifCtx.Provider value={notify}>
            {children}
            <div style={{ position:'fixed', top:76, right:20, zIndex:9999, display:'flex', flexDirection:'column', gap:8, width:320 }}>
                {notifs.map(n => (
                    <div key={n.id} className="notif-enter glass-dark rounded-xl px-4 py-3 flex items-center gap-3 text-sm"
                        style={{ borderLeft:`3px solid ${n.type==='success'?'#22c55e':n.type==='error'?'#ef4444':'#3b82f6'}` }}>
                        <span style={{ color:n.type==='success'?'#22c55e':n.type==='error'?'#ef4444':'#3b82f6', fontWeight:700 }}>{n.type==='success'?'✓':n.type==='error'?'✕':'ℹ'}</span>
                        <span className="text-slate-200 flex-1">{n.msg}</span>
                    </div>
                ))}
            </div>
        </NotifCtx.Provider>
    );
};

// ── NAVIGATION ────────────────────────────────────────────────────────────────
const Navigation = ({ view, setView, userRole, onLogout }) => (
    <nav className="fixed top-0 left-0 right-0 z-50 px-6 py-4 flex justify-between items-center glass-dark">
        <div className="flex items-center gap-2 cursor-pointer" onClick={() => { onLogout && onLogout(); setView('landing'); }}>
            <div className="w-8 h-8 bg-green-500 rounded flex items-center justify-center">
                <LucideIcon name="shield" className="text-black w-5 h-5" />
            </div>
            <span className="text-white font-bold tracking-tighter text-xl">A.R.A.N.Y.A</span>
        </div>
        <div className="flex gap-4 items-center">
            {userRole && (
                <span className="text-green-500 text-xs font-mono bg-green-500/10 px-3 py-1 rounded-full border border-green-500/20">
                    {userRole==='gov'?'🛡 GOV OFFICIAL':'👤 CITIZEN'}
                </span>
            )}
            {!userRole ? (
                <button onClick={() => setView('login')} className="bg-green-500 hover:bg-green-400 transition-colors text-black px-4 py-1.5 rounded-full font-semibold text-sm">Access Terminal</button>
            ) : (
                <button onClick={() => { onLogout(); setView('landing'); }} className="bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/20 px-4 py-1.5 rounded-full font-semibold text-sm transition-colors">Log Out</button>
            )}
        </div>
    </nav>
);

// ══════════════════════════════════════════════════════════════════════════════
// ── PIPELINE SIMULATION SCREEN ───────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════════════════
const PIPELINE_STAGES = [
    {
        id: 'ingest',
        step: '01',
        icon: 'satellite',
        title: 'Data Ingestion',
        subtitle: 'Streaming Satellite + Environmental Feeds',
        color: '#22c55e',
        description: 'Raw multispectral imagery from Sentinel-2 (10m GSD) and Cartosat streams is ingested as a continuous feed. Weather telemetry, protected-zone shapefiles and administrative boundaries are fused simultaneously.',
        dataPoints: [
            { label: 'Sentinel-2 Band B4 (Red)', val: '10m GSD', status: 'LIVE' },
            { label: 'Sentinel-2 Band B8 (NIR)', val: '10m GSD', status: 'LIVE' },
            { label: 'Weather API – IMD / OpenWeather', val: '15 min', status: 'LIVE' },
            { label: 'Protected Zone Shapefiles', val: 'Loaded', status: 'OK' },
            { label: 'Admin Boundary Layers', val: 'Loaded', status: 'OK' },
        ],
        visual: 'ingest'
    },
    {
        id: 'preprocess',
        step: '02',
        icon: 'cpu',
        title: 'Preprocessing Engine',
        subtitle: 'Cloud Masking · Spectral Indices · Temporal Alignment',
        color: '#3b82f6',
        description: 'Raw tiles are stripped of cloud contamination, calibrated radiometrically, and converted into spectral-index feature maps (NDVI, NDBI). Every pixel is temporally registered against a historical baseline.',
        metrics: [
            { label: 'Cloud Masking', pct: 97, col: '#22c55e' },
            { label: 'NDVI Computation', pct: 100, col: '#22c55e' },
            { label: 'NDBI Computation', pct: 100, col: '#22c55e' },
            { label: 'Temporal Alignment', pct: 94, col: '#3b82f6' },
            { label: 'Tile Extraction (ROI)', pct: 100, col: '#22c55e' },
        ],
        visual: 'preprocess'
    },
    {
        id: 'statedef',
        step: '03',
        icon: 'layers',
        title: 'State Definition & Regime Space',
        subtitle: 'Zₜ ∈ {Vegetation, Barren, Built-up, Mining, Water}',
        color: '#a855f7',
        description: 'Each region is assigned a time-dependent ecological state vector Zₜ. Transitions between states — especially Vegetation → Mining Scar and Protected Zone → High Penalty State — trigger the risk engine.',
        states: ['Vegetation', 'Barren', 'Built-up', 'Mining Scar', 'Water Body'],
        stateColors: ['#22c55e', '#eab308', '#f97316', '#ef4444', '#3b82f6'],
        visual: 'statedef'
    },
    {
        id: 'risk',
        step: '04',
        icon: 'activity',
        title: 'Risk Emission Model',
        subtitle: 'P(Illegal | Zₜ, ΔZₜ, proximity, rainfall)',
        color: '#ef4444',
        description: 'A probabilistic risk scoring model computes a 0–100 threat index for each zone. It integrates vegetation loss delta, excavation growth rate, proximity to protected boundaries, historical violation patterns, and rainfall correlation.',
        factors: [
            { name: 'Vegetation Loss Δ', weight: 32, col: '#ef4444' },
            { name: 'Excavation Growth', weight: 27, col: '#f97316' },
            { name: 'Proximity to Protected Zone', weight: 22, col: '#eab308' },
            { name: 'Historical Patterns', weight: 12, col: '#a855f7' },
            { name: 'Rainfall Correlation', weight: 7, col: '#3b82f6' },
        ],
        visual: 'risk'
    },
    {
        id: 'compliance',
        step: '05',
        icon: 'shield-check',
        title: 'Compliance Intelligence Engine',
        subtitle: 'Detection → Legal Reasoning → Actionable Alert',
        color: '#22c55e',
        description: 'When Risk Score > threshold, the system auto-triggers a geo-tagged violation alert, retrieves the relevant legal provision (e.g. Forest Conservation Act §4(1)), generates an AI explanation, and logs the dossier for enforcement.',
        actions: [
            { label: 'Threshold Evaluation', icon: 'check-circle', done: true },
            { label: 'Policy Retrieval (FCA §4)', icon: 'book-open', done: true },
            { label: 'Explanation Generation', icon: 'file-text', done: true },
            { label: 'Alert Dispatch (SMS/Email)', icon: 'bell', done: true },
            { label: 'Enforcement Dossier Logged', icon: 'archive', done: true },
        ],
        visual: 'compliance'
    },
];

// ── Visual: Ingest ─────────────────────────────────────────────
const VisualIngest = () => {
    const [tick, setTick] = useState(0);
    useEffect(() => { const t = setInterval(() => setTick(x => x+1), 400); return () => clearInterval(t); }, []);
    const streams = ['B4 Red Band', 'B8 NIR Band', 'SWIR B11', 'Weather API', 'Shapefile Layer', 'Admin Boundary'];
    return (
        <div className="relative w-full h-full flex items-center justify-center" style={{minHeight:260}}>
            {/* satellite */}
            <div className="absolute top-4 right-8 flex flex-col items-center gap-1">
                <div className="w-12 h-12 bg-zinc-800 border border-green-500/30 rounded-xl flex items-center justify-center relative ping-ring">
                    <LucideIcon name="satellite" className="w-6 h-6 text-green-400" />
                </div>
                <span className="text-[9px] font-mono text-green-500">SENTINEL-2</span>
            </div>
            {/* streams */}
            <div className="flex flex-col gap-2 w-full px-2">
                {streams.map((s,i) => (
                    <div key={s} className="flex items-center gap-2 text-[10px] font-mono" style={{animationDelay:`${i*80}ms`}}>
                        <div className={`w-2 h-2 rounded-full flex-shrink-0 ${tick % (i+2) === 0 ? 'bg-green-500' : 'bg-green-500/30'}`} style={{transition:'background 0.1s'}}></div>
                        <div className="flex-1 h-1.5 rounded-full bg-white/5 overflow-hidden">
                            <div className="h-full bg-green-500/60 shimmer-bar" style={{width:`${60+i*6}%`}}></div>
                        </div>
                        <span className="text-slate-500 w-24 truncate">{s}</span>
                        <span className="text-green-500">✓</span>
                    </div>
                ))}
                <div className="mt-2 p-2 bg-green-500/5 border border-green-500/20 rounded-lg text-[10px] font-mono text-green-400 terminal-cursor">
                    INGESTING 1,847 TILES @ 10m GSD...
                </div>
            </div>
        </div>
    );
};

// ── Visual: Preprocess ─────────────────────────────────────────
const VisualPreprocess = () => {
    const [active, setActive] = useState(0);
    useEffect(() => { const t = setInterval(() => setActive(x => (x+1)%3), 900); return () => clearInterval(t); }, []);
    const panels = ['RAW TILE','CLOUD MASKED','NDVI INDEX'];
    const colors = ['from-zinc-800','from-blue-900/40','from-green-900/40'];
    const overlays = [
        <div key="raw" className="absolute inset-0 opacity-20" style={{backgroundImage:'radial-gradient(circle, rgba(255,255,255,0.3) 1px, transparent 1px)', backgroundSize:'8px 8px'}}></div>,
        <div key="masked" className="absolute inset-0 flex items-center justify-center"><div className="w-16 h-16 rounded-full bg-white/10 border border-white/20"></div></div>,
        <div key="ndvi" className="absolute inset-0" style={{background:'linear-gradient(135deg, #15803d 0%, #22c55e 40%, #eab308 70%, #ef4444 100%)', opacity:0.6}}></div>
    ];
    return (
        <div className="flex gap-3 w-full items-center justify-center" style={{minHeight:260}}>
            {panels.map((p,i) => (
                <div key={p} className={`flex-1 relative rounded-xl overflow-hidden border transition-all duration-300 ${active===i?'border-green-500/60 shadow-[0_0_15px_rgba(34,197,94,0.2)]':'border-white/10'}`}
                    style={{height:160, background:'#111'}}>
                    <div className={`absolute inset-0 bg-gradient-to-br ${colors[i]} to-black/80`}></div>
                    {overlays[i]}
                    <div className="absolute bottom-2 left-2 right-2 text-[9px] font-mono text-slate-400">{p}</div>
                    {active===i && <div className="scan-line"></div>}
                </div>
            ))}
            <svg className="w-0 h-0"><defs></defs></svg>
        </div>
    );
};

// ── Visual: State Definition ──────────────────────────────────
const VisualStateDef = ({ states, stateColors }) => {
    const [active, setActive] = useState(0);
    useEffect(() => { const t = setInterval(() => setActive(x => (x+1)%states.length), 1200); return () => clearInterval(t); }, [states.length]);
    const grid = useMemo(() => {
        return Array.from({length:200}, () => Math.floor(Math.random()*states.length));
    }, [states.length]);
    return (
        <div className="w-full" style={{minHeight:260}}>
            <div className="grid gap-1" style={{gridTemplateColumns:'repeat(20,1fr)'}}>
                {grid.map((s,i) => (
                    <div key={i} className="rounded-[2px] transition-all duration-500"
                        style={{height:10, background:active===s ? stateColors[s] : stateColors[s]+'33', opacity: active===s?1:0.4}}></div>
                ))}
            </div>
            <div className="flex flex-wrap gap-2 mt-3">
                {states.map((s,i) => (
                    <div key={s} className={`flex items-center gap-1.5 px-2 py-1 rounded-full text-[10px] font-mono border transition-all ${active===i?'border-current scale-105':''}`}
                        style={{color:stateColors[i], borderColor:active===i?stateColors[i]:'transparent', background:`${stateColors[i]}15`}}>
                        <div className="w-2 h-2 rounded-full" style={{background:stateColors[i]}}></div>
                        {s}
                    </div>
                ))}
            </div>
        </div>
    );
};

// ── Visual: Risk Model ─────────────────────────────────────────
const VisualRisk = ({ factors }) => {
    const [score, setScore] = useState(0);
    useEffect(() => {
        let v = 0;
        const t = setInterval(() => { v = Math.min(v+2, 88); setScore(v); if(v>=88) clearInterval(t); }, 30);
        return () => clearInterval(t);
    }, []);
    const scoreColor = score >= 75 ? '#ef4444' : score >= 50 ? '#eab308' : '#22c55e';
    return (
        <div className="flex gap-4 items-start w-full" style={{minHeight:260}}>
            {/* Score gauge */}
            <div className="flex flex-col items-center gap-2">
                <div className="relative w-28 h-28">
                    <svg viewBox="0 0 100 100" className="w-full h-full -rotate-90">
                        <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth="8"/>
                        <circle cx="50" cy="50" r="40" fill="none" stroke={scoreColor} strokeWidth="8"
                            strokeDasharray={`${(score/100)*251.2} 251.2`} strokeLinecap="round" style={{transition:'stroke-dasharray 0.05s'}}/>
                    </svg>
                    <div className="absolute inset-0 flex flex-col items-center justify-center">
                        <span className="text-2xl font-black" style={{color:scoreColor}}>{score}</span>
                        <span className="text-[9px] font-mono text-slate-500">RISK</span>
                    </div>
                </div>
                <span className="text-[10px] font-mono px-2 py-0.5 rounded-full font-bold" style={{background:`${scoreColor}20`,color:scoreColor}}>
                    {score>=75?'HIGH RISK':score>=50?'MEDIUM':'LOW'}
                </span>
            </div>
            {/* Factor bars */}
            <div className="flex-1 space-y-2">
                {factors.map(f => (
                    <div key={f.name}>
                        <div className="flex justify-between text-[9px] font-mono mb-0.5">
                            <span className="text-slate-400">{f.name}</span>
                            <span style={{color:f.col}}>{f.weight}%</span>
                        </div>
                        <div className="h-1.5 bg-white/5 rounded-full overflow-hidden">
                            <div className="h-full rounded-full transition-all duration-1000" style={{width:`${f.weight}%`, background:f.col}}></div>
                        </div>
                    </div>
                ))}
            </div>
        </div>
    );
};

// ── Visual: Compliance ─────────────────────────────────────────
const VisualCompliance = ({ actions }) => {
    const [revealed, setRevealed] = useState(0);
    useEffect(() => {
        const t = setInterval(() => setRevealed(x => Math.min(x+1, actions.length)), 600);
        return () => clearInterval(t);
    }, [actions.length]);
    return (
        <div className="w-full space-y-2" style={{minHeight:260}}>
            <div className="p-3 bg-red-500/10 border border-red-500/30 rounded-xl text-xs font-mono text-red-400 mb-4">
                ⚠ RISK THRESHOLD EXCEEDED — ZONE: ARAVALLI-C — SCORE: 88/100
            </div>
            {actions.map((a,i) => (
                <div key={a.label} className={`flex items-center gap-3 p-3 rounded-xl border transition-all duration-500 ${i<revealed?'border-green-500/30 bg-green-500/5':'border-white/5 bg-white/2 opacity-30'}`}>
                    <div className={`w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 ${i<revealed?'bg-green-500':'bg-zinc-800'}`}>
                        {i<revealed ? <LucideIcon name="check" className="w-3 h-3 text-black" /> : <LucideIcon name={a.icon} className="w-3 h-3 text-slate-600" />}
                    </div>
                    <span className={`text-xs font-mono ${i<revealed?'text-white':'text-slate-600'}`}>{a.label}</span>
                    {i<revealed && <span className="ml-auto text-[9px] text-green-500 font-mono">DONE</span>}
                </div>
            ))}
            {revealed >= actions.length && (
                <div className="p-3 bg-green-500/10 border border-green-500/30 rounded-xl text-[10px] font-mono text-green-400 mt-2">
                    ✓ DOSSIER GENERATED — ENFORCEMENT TEAM NOTIFIED — LOG ID: {genId()}
                </div>
            )}
        </div>
    );
};

// ── Connecting Flow Diagram ────────────────────────────────────
const FlowDiagram = ({ activeStage, stages, onSelect }) => (
    <div className="relative w-full overflow-x-auto py-4">
        <div className="flex items-center gap-0 min-w-max mx-auto px-4" style={{width:'max-content'}}>
            {stages.map((s, i) => (
                <React.Fragment key={s.id}>
                    <button onClick={() => onSelect(i)}
                        className={`flex flex-col items-center gap-1.5 px-3 py-2 rounded-xl transition-all border ${activeStage===i?'border-current bg-opacity-10 scale-105':'border-transparent hover:border-white/10'}`}
                        style={{color:activeStage===i?s.color:'#64748b', background:activeStage===i?`${s.color}12`:'transparent'}}>

const SimulationScreen = ({ onComplete }) => {
    const [stage, setStage] = useState(0);
    const [autoplay, setAutoplay] = useState(true);
    const [introPhase, setIntroPhase] = useState(true);
    const [bootLines, setBootLines] = useState([]);
    const stageData = PIPELINE_STAGES[stage];
    const notify = useNotify();

    const BOOT_SEQUENCE = [
        '> Initializing A.R.A.N.Y.A Geospatial Core...',
        '> Loading Sentinel-2 data connectors... OK',
        '> Mounting protected zone shapefiles... OK',
        '> Establishing Weather API stream... OK',
        '> Calibrating Change-Detection Transformer... OK',
        '> Risk Emission Model loaded... OK',
        '> Compliance Intelligence Engine online... OK',
        '████████████████████ SYSTEM READY',
    ];

    useEffect(() => {
        if (!introPhase) return;
        let i = 0;
        const t = setInterval(() => {
            setBootLines(p => [...p, BOOT_SEQUENCE[i]]);
            i++;
            if (i >= BOOT_SEQUENCE.length) {
                clearInterval(t);
                setTimeout(() => setIntroPhase(false), 800);
            }
        }, 320);
        return () => clearInterval(t);
    }, [introPhase]);

    useEffect(() => {
        if (introPhase || !autoplay) return;
        const t = setInterval(() => {
            setStage(s => {
                if (s >= PIPELINE_STAGES.length - 1) { clearInterval(t); return s; }
                return s + 1;
            });
        }, 5500);
        return () => clearInterval(t);
    }, [autoplay, introPhase]);

    const goNext = () => {
        if (stage < PIPELINE_STAGES.length - 1) { setStage(s => s+1); setAutoplay(false); }
        else { onComplete(); }
    };
    const goPrev = () => { if (stage > 0) { setStage(s => s-1); setAutoplay(false); } };

    const renderVisual = () => {
        switch(stageData.id) {
            case 'ingest': return <VisualIngest />;
            case 'preprocess': return <VisualPreprocess />;
            case 'statedef': return <VisualStateDef states={stageData.states} stateColors={stageData.stateColors} />;
            case 'risk': return <VisualRisk factors={stageData.factors} />;
            case 'compliance': return <VisualCompliance actions={stageData.actions} />;
            default: return null;
        }
    };

    // Boot screen
    if (introPhase) {
        return (
            <div className="min-h-screen bg-black flex flex-col items-center justify-center px-8 pt-20">
                <div className="w-full max-w-2xl">
                    <div className="flex items-center gap-3 mb-6">
                        <div className="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                        <span className="font-mono text-green-500 text-sm font-bold tracking-widest uppercase">A.R.A.N.Y.A System Boot</span>
                    </div>
                    <div className="bg-zinc-950 border border-green-500/20 rounded-2xl p-6 font-mono text-xs text-green-400 space-y-1.5" style={{minHeight:280}}>
                        {bootLines.map((line, i) => (
                            <div key={i} className="sim-stage" style={{animationDelay:`${i*20}ms`}}>
                                <span style={{color:line.includes('READY')?'#22c55e':line.includes('...')?'#94a3b8':'#22c55e'}}>{line}</span>
                            </div>
                        ))}
                        {bootLines.length > 0 && bootLines.length < BOOT_SEQUENCE.length && (
                            <div className="terminal-cursor text-green-500">&nbsp;</div>
                        )}
                    </div>
                </div>
            </div>
        );
    }

    return (
        <div className="min-h-screen bg-[#030303] pt-20 pb-10 px-4">
            {/* Header */}
            <div className="max-w-6xl mx-auto mb-6">
                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <div>
                        <div className="flex items-center gap-2 mb-1">
                            <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                            <span className="text-green-500 font-mono text-xs tracking-widest uppercase">Pipeline Simulation — Interactive Walkthrough</span>
                        </div>
                        <h1 className="text-2xl md:text-3xl font-bold">How A.R.A.N.Y.A Works</h1>
                        <p className="text-slate-500 text-sm mt-1">Step through the full end-to-end intelligence pipeline</p>
                    </div>
                    <div className="flex items-center gap-3">
                        <button onClick={() => { setAutoplay(p => !p); }}
                            className={`flex items-center gap-2 text-xs font-mono px-4 py-2 rounded-xl border transition-all ${autoplay?'bg-green-500/10 border-green-500/30 text-green-400':'bg-white/5 border-white/10 text-slate-400'}`}>
                            <LucideIcon name={autoplay?'pause':'play'} className="w-3 h-3" />
                            {autoplay?'Auto':'Manual'}
                        </button>
                        <button onClick={onComplete}
                            className="flex items-center gap-2 bg-white text-black text-xs font-bold px-5 py-2 rounded-xl hover:bg-green-500 transition-colors">
                            Enter System <LucideIcon name="arrow-right" className="w-3 h-3" />
                        </button>
                    </div>
                </div>
            </div>

            {/* Flow diagram */}
            <div className="max-w-6xl mx-auto mb-6 glass rounded-2xl border border-white/5 overflow-hidden">
                <FlowDiagram activeStage={stage} stages={PIPELINE_STAGES} onSelect={i => { setStage(i); setAutoplay(false); }} />
                {/* progress bar */}
                <div className="px-4 pb-3">
                    <div className="h-1 bg-white/5 rounded-full overflow-hidden">
                        <div className="h-full bg-green-500 rounded-full transition-all duration-700" style={{width:`${((stage+1)/PIPELINE_STAGES.length)*100}%`}}></div>

            {/* Main content */}

                                                <div><div className={`text-sm font-bold ${step.done?'text-white':'text-slate-600'}`}>{step.label}</div>{step.date&&<div className="text-[10px] text-slate-500">{step.date}</div>}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </motion.div>
                    </motion.div>
                )}
            </AnimatePresence>
        </div>
    );
};

// ── CITIZEN PORTAL ────────────────────────────────────────────────────────────
const CitizenPortal = ({ reports, setReports }) => {
    const notify = useNotify();
    const [tab, setTab] = useState('report');
    const [myIds, setMyIds] = useState([]);
    const [submitting, setSubmitting] = useState(false);
    const [submitted, setSubmitted] = useState(false);
    const [expanded, setExpanded] = useState(null);
    const [gpsLoading, setGpsLoading] = useState(false);
    const [form, setForm] = useState({ description:'', topic:'', violationType:'', zone:'', lat:'', lng:'' });
    const captureGPS = () => {
        setGpsLoading(true);
        const done = (lat,lng) => { setForm(f=>({...f,lat,lng})); setGpsLoading(false); notify('Location captured!','success'); };
        if(navigator.geolocation) navigator.geolocation.getCurrentPosition(p=>done(p.coords.latitude.toFixed(4),p.coords.longitude.toFixed(4)),()=>done((26.5+Math.random()*3).toFixed(4),(75.5+Math.random()*2.5).toFixed(4)));
        else done((26.5+Math.random()*3).toFixed(4),(75.5+Math.random()*2.5).toFixed(4));
    };
    const handleReport = e => {
        e.preventDefault();
        if(!form.description||!form.topic||!form.violationType||!form.zone){ notify('Please fill all required fields','error'); return; }
        setSubmitting(true);
        setTimeout(()=>{
            const rep = { id:genId(), topic:form.topic, coords:form.lat&&form.lng?`${form.lat}° N, ${form.lng}° E`:'28.6139° N, 77.2090° E', lat:parseFloat(form.lat)||28.6139, lng:parseFloat(form.lng)||77.2090, status:'Pending Review', risk:Math.floor(Math.random()*40)+30, loss:`${(Math.random()*10+1).toFixed(1)}%`, date:new Date().toISOString().split('T')[0], citizen:'Anonymous Citizen', description:form.description, zone:form.zone, violationType:form.violationType };
            setReports(p=>[rep,...p]); setMyIds(p=>[rep.id,...p]); setSubmitting(false); setSubmitted(true);
            setForm({description:'',topic:'',violationType:'',zone:'',lat:'',lng:''});
            notify('Report submitted successfully!','success');
            setTimeout(()=>{ setSubmitted(false); setTab('track'); },2500);
        },1800);
    };
    const myReports = reports.filter(r=>myIds.includes(r.id));
    const stepsFor = rep => [
        {label:'Submitted',done:true,date:rep.date},{label:'Viewed by Authority',done:['Under Review','Under Investigation','Resolved','Closed'].includes(rep.status)},{label:'AI Analysis Complete',done:['Under Review','Under Investigation','Resolved','Closed'].includes(rep.status),date:'Automated'},{label:'Investigation Started',done:['Under Investigation','Resolved','Closed'].includes(rep.status)},{label:'Resolved',done:['Resolved','Closed'].includes(rep.status)}
    ];
    return (
        <div className="min-h-screen bg-slate-50 pt-24 pb-12 px-6">
            <div className="max-w-4xl mx-auto">
                <header className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                    <div><h1 className="text-3xl font-extrabold text-slate-900 tracking-tight">Citizen Empowerment Portal</h1><p className="text-slate-500">Transparent environmental governance at your fingertips.</p></div>
                    <div className="flex bg-white p-1 rounded-xl shadow-sm border border-slate-200">
                        {[['report','New Complaint'],['track','Track Status'],['public','All Reports']].map(([id,label])=>(
                            <button key={id} onClick={()=>setTab(id)} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all ${tab===id?'bg-blue-600 text-white shadow-md':'text-slate-600'}`} style={{fontFamily:'Inter,sans-serif'}}>{label}</button>
                        ))}
                    </div>
                </header>
                <div className="grid md:grid-cols-3 gap-8">
                    <div className="md:col-span-2 space-y-6">
                        {tab==='report' && (
                            <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                                {submitted ? (
                                    <div className="text-center py-10">
                                        <div className="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4"><LucideIcon name="check-circle-2" className="w-8 h-8 text-green-500"/></div>
                                        <h3 className="text-xl font-bold text-slate-900 mb-2">Report Submitted Successfully</h3>
                                        <p className="text-slate-500 text-sm">Redirecting to tracking…</p>
                                    </div>
                                ) : (
                                    <form onSubmit={handleReport} className="space-y-5">
                                        <h3 className="text-xl font-bold text-slate-800">Report an Observation</h3>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div><label className="block text-xs font-bold text-slate-500 uppercase mb-2">Title *</label><input required value={form.topic} onChange={e=>setForm(f=>({...f,topic:e.target.value}))} placeholder="E.g., Illegal tree felling" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-900 text-sm focus:ring-2 focus:ring-blue-500 outline-none"/></div>
                                            <div><label className="block text-xs font-bold text-slate-500 uppercase mb-2">Violation Type *</label><select required value={form.violationType} onChange={e=>setForm(f=>({...f,violationType:e.target.value}))} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-900 text-sm focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer"><option value="">Select…</option>{VIOLATION_TYPES.map(v=><option key={v}>{v}</option>)}</select></div>
                                            <div><label className="block text-xs font-bold text-slate-500 uppercase mb-2">Forest Zone *</label><select required value={form.zone} onChange={e=>setForm(f=>({...f,zone:e.target.value}))} className="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-900 text-sm focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer"><option value="">Select zone…</option>{ZONES.map(z=><option key={z}>{z}</option>)}</select></div>
                                            <div><label className="block text-xs font-bold text-slate-500 uppercase mb-2">Location</label><div onClick={captureGPS} className="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-xl p-3 cursor-pointer hover:bg-slate-100 transition-colors"><LucideIcon name="map-pin" className="w-4 h-4 text-blue-600"/><span className="text-xs font-medium text-slate-400 italic">{gpsLoading?'Detecting…':form.lat?`${form.lat}° N`:'Auto-detect GPS…'}</span></div></div>
                                        </div>
                                        <div><label className="block text-xs font-bold text-slate-500 uppercase mb-2">Description *</label><textarea required value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="What are you seeing?" className="w-full bg-slate-50 border border-slate-200 rounded-xl p-4 text-slate-900 h-32 focus:ring-2 focus:ring-blue-500 outline-none shadow-inner text-sm resize-none"></textarea></div>
                                        <button type="submit" disabled={submitting} className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 text-white font-bold py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2" style={{fontFamily:'Inter,sans-serif'}}>
                                            {submitting?<><div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>Submitting…</>:'Finalize & Send Report'}
                                        </button>
                                    </form>
                                )}
                            </div>
                        )}
                        {tab==='track' && (
                            <div className="space-y-4">
                                {myReports.length===0?(<div className="bg-white p-12 rounded-3xl border border-slate-200 text-center"><p className="text-slate-400 text-sm mb-4">No reports submitted yet in this session.</p><button onClick={()=>setTab('report')} className="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold text-sm" style={{fontFamily:'Inter,sans-serif'}}>Submit a Report</button></div>):myReports.map(rep=>(
                                    <div key={rep.id} className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                                        <div className="flex justify-between items-start mb-4">
                                            <div><span className="text-[10px] font-mono text-slate-400">{rep.id}</span><h3 className="font-bold text-lg text-slate-800">{rep.topic}</h3><p className="text-xs text-slate-400">{rep.zone} • {rep.date}</p></div>
                                            <div className="flex items-center gap-2"><span className="px-3 py-1 bg-blue-100 text-blue-700 text-[10px] font-bold rounded-full">{rep.status}</span><button onClick={()=>setExpanded(expanded===rep.id?null:rep.id)} className="text-xs text-slate-400 hover:text-slate-600">{expanded===rep.id?'Hide':'Details'}</button></div>
                                        </div>
                                        {expanded===rep.id && (<div className="relative pt-6"><div className="absolute top-0 left-4 w-0.5 h-full bg-slate-100"></div>{stepsFor(rep).map((step,idx)=>(<div key={idx} className="flex gap-4 mb-4 relative z-10"><div className={`w-8 h-8 rounded-full border-4 border-white flex items-center justify-center ${step.done?'bg-green-500':'bg-slate-200'}`}>{step.done&&<LucideIcon name="check-circle-2" className="w-4 h-4 text-white"/>}</div><div><div className={`text-sm font-bold ${step.done?'text-slate-800':'text-slate-400'}`}>{step.label}</div>{step.date&&<div className="text-[10px] text-slate-400">{step.date}</div>}</div></div>))}</div>)}
                                    </div>
                                ))}
                            </div>
                        )}
                        {tab==='public' && (
                            <div className="space-y-4">
                                <h3 className="font-bold text-slate-800">All Reported Incidents ({reports.length})</h3>
                                {reports.map(rep=>(
                                    <div key={rep.id} className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                                        <div className="flex justify-between items-start mb-2">
                                            <div><span className="text-[10px] font-mono text-slate-400">{rep.id}</span><h3 className="font-bold text-lg text-slate-800">{rep.topic}</h3><p className="text-xs text-slate-400">{rep.zone||'—'} • {rep.violationType||'—'} • {rep.date}</p></div>
                                            <div className="flex items-center gap-2"><span className="text-xs font-bold px-2 py-1 rounded-full" style={{background:rep.risk>=75?'#fee2e2':rep.risk>=50?'#fef9c3':'#dcfce7',color:rep.risk>=75?'#b91c1c':rep.risk>=50?'#a16207':'#15803d'}}>{rep.risk}% risk</span><span className="px-3 py-1 bg-blue-100 text-blue-700 text-[10px] font-bold rounded-full">{rep.status}</span></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                    <div className="space-y-6 text-slate-800">
                        <div className="bg-white p-6 rounded-3xl border border-slate-200 space-y-4"><h4 className="text-sm font-bold text-slate-800">Why Transparency Matters</h4><p className="text-xs text-slate-500 leading-relaxed">By tracking your complaint, you ensure that government officials are accountable. Every observation submitted is backed by satellite auditing.</p><div className="p-4 bg-slate-50 rounded-2xl flex items-center gap-3"><LucideIcon name="shield" className="w-8 h-8 text-blue-600"/><div className="text-xs text-slate-700 font-medium">Classed as Official Evidence</div></div></div>
                        <div className="bg-slate-900 p-6 rounded-3xl text-white space-y-4 shadow-xl"><h4 className="text-sm font-bold">Community Impact</h4><div className="flex items-center gap-4"><div className="text-2xl font-black text-green-500">{reports.filter(r=>['Resolved','Closed'].includes(r.status)).length||'0'}</div><div className="text-[10px] text-slate-400 leading-tight uppercase font-mono">Cases Resolved<br/>This Quarter</div></div><div className="flex items-center gap-4"><div className="text-2xl font-black text-blue-400">{reports.length}</div><div className="text-[10px] text-slate-400 leading-tight uppercase font-mono">Total Reports<br/>Filed</div></div><div className="w-full bg-white/10 h-1.5 rounded-full overflow-hidden"><div className="bg-green-500 h-full transition-all duration-700" style={{width:`${reports.length>0?Math.round(reports.filter(r=>['Resolved','Closed'].includes(r.status)).length/reports.length*100):0}%`}}></div></div></div>
                    </div>
                </div>
            </div>
        </div>
    );
};

// ── APP ───────────────────────────────────────────────────────────────────────
const App = () => {
    const [view, setView] = useState('landing');
    const [userRole, setUserRole] = useState(null);
    const [reports, setReports] = useState(INITIAL_REPORTS);

    const handleLogin = role => { setUserRole(role); setView(role); };
    const handleLogout = () => { setUserRole(null); };

    useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, []);

    return (
        <NotificationProvider>
            <div className="min-h-screen">
                <Navigation view={view} setView={setView} userRole={userRole} onLogout={handleLogout}/>
                <AnimatePresence mode="wait">
                    {view==='landing' && (
                        <motion.div key="landing" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}}>
                            <LandingPage onStart={() => setView('simulation')}/>
                        </motion.div>
                    )}
                    {view==='simulation' && (
                        <motion.div key="sim" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}}>
                            <SimulationScreen onComplete={() => setView('login')}/>
                        </motion.div>
                    )}
                    {view==='login' && (
                        <motion.div key="login" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}}>
                            <LoginScreen onLogin={handleLogin}/>
                        </motion.div>
                    )}
                    {view==='gov' && (
                        <motion.div key="gov" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}}>
                            <GovDashboard reports={reports} setReports={setReports} onLogout={handleLogout}/>
                        </motion.div>
                    )}
                    {view==='citizen' && (
                        <motion.div key="citizen" initial={{opacity:0}} animate={{opacity:1}} exit={{opacity:0}}>
                            <CitizenPortal reports={reports} setReports={setReports} onLogout={handleLogout}/>
                        </motion.div>
                    )}
                </AnimatePresence>
            </div>
        </NotificationProvider>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
